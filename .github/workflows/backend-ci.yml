name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Compile backend
        run: python -m compileall backend/app

      - name: Lint backend
        run: ruff check backend/app backend/tests

      - name: Validate Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: sqlite:////tmp/atlas_alembic_ci.sqlite
          JWT_SECRET_KEY: ci-secret
        run: alembic -c alembic.ini upgrade head

      - name: Run backend tests
        env:
          DATABASE_URL: sqlite:////tmp/atlas_pytest_ci.sqlite
          JWT_SECRET_KEY: ci-secret
        run: pytest backend/tests
